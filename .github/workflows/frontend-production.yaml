name: Frontend Production Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

on:
  push:
    branches:
      - main

jobs:
  Deploy-Production:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Vercel CLI
        run: pnpm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=production --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --prod --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        run: >
          vercel deploy --prebuilt --prod --yes --scope=eagami
          --token=${{ secrets.VERCEL_TOKEN }}
          --meta githubCommitRef=${{ github.ref_name }}
          --meta githubCommitSha=${{ github.sha }}
          --meta githubCommitOrg=${{ github.repository_owner }}
          --meta githubCommitRepo=${{ github.event.repository.name }}
          --meta githubDeployment=1

  Create-Release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Extract Version from Changelog
        id: version
        run: |
          version=$(grep -m1 -oP '## \[\K[0-9]+\.[0-9]+\.[0-9]+' CHANGELOG.md)
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=v$version" >> "$GITHUB_OUTPUT"

      - name: Check if Release Exists
        id: check_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if gh release view "v${{ steps.version.outputs.version }}" > /dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Extract Release Notes
        if: steps.check_release.outputs.exists == 'false'
        id: notes
        run: |
          # Extract content between first and second ## headers
          awk '/^## \[/{if(n++)exit}n' CHANGELOG.md | tail -n +2 > release_notes.md

      - name: Create Tag and Release
        if: steps.check_release.outputs.exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ steps.version.outputs.tag }} \
            --target ${{ github.sha }} \
            --title "${{ steps.version.outputs.tag }}" \
            --notes-file release_notes.md
