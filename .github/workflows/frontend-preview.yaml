name: Frontend Preview Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_FRONTEND_PROJECT_ID }}

on:
  push:
    branches-ignore:
      - main

permissions:
  contents: read
  pull-requests: read

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Vercel CLI
        run: pnpm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Inject Preview Build Info
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-7)
          COMMIT_DATE=$(git log -1 --format=%ci)
          PR_URL=$(gh pr view "$GITHUB_REF_NAME" --json url --jq .url 2>/dev/null || echo "")
          sed -i "s|preview: null.*|preview: { branch: '${GITHUB_REF_NAME}', commit: '${SHORT_SHA}', date: '${COMMIT_DATE}', prUrl: '${PR_URL}' },|" src/environments/environment.preview.ts

      - name: Override Build Command for Preview
        run: |
          node -e "
            const fs = require('fs');
            const p = JSON.parse(fs.readFileSync('.vercel/project.json', 'utf8'));
            p.settings = p.settings || {};
            p.settings.buildCommand = 'pnpm build:preview';
            fs.writeFileSync('.vercel/project.json', JSON.stringify(p, null, 2));
          "

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        id: deploy
        run: |
          DEPLOY_URL=$(vercel deploy --prebuilt \
            --token=${{ secrets.VERCEL_TOKEN }} \
            --meta githubCommitRef=${{ github.ref_name }} \
            --meta githubCommitSha=${{ github.sha }} \
            --meta githubCommitOrg=${{ github.repository_owner }} \
            --meta githubCommitRepo=${{ github.event.repository.name }} \
            --meta githubDeployment=1)
          echo "url=$DEPLOY_URL" >> "$GITHUB_OUTPUT"

      - name: Alias to Preview Domain
        run: vercel alias set ${{ steps.deploy.outputs.url }} preview.brewskibets.com --token=${{ secrets.VERCEL_TOKEN }} --scope=eagami
