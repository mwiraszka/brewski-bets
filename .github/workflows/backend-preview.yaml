name: Backend Preview Deployment

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: ${{ secrets.VERCEL_BACKEND_PROJECT_ID }}

on:
  push:
    branches-ignore:
      - main
    paths:
      - backend/**
      - .github/workflows/backend-preview.yaml

jobs:
  Deploy-Preview:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
        with:
          version: 9

      - name: Install Vercel CLI
        run: pnpm install --global vercel

      - name: Pull Vercel Environment Information
        run: vercel pull --yes --environment=preview --token=${{ secrets.VERCEL_TOKEN }}

      - name: Build Project Artifacts
        run: vercel build --token=${{ secrets.VERCEL_TOKEN }}

      - name: Deploy Project Artifacts
        id: deploy
        run: >
          echo "url=$(vercel deploy --prebuilt
          --token=${{ secrets.VERCEL_TOKEN }}
          --meta githubCommitRef=${{ github.ref_name }}
          --meta githubCommitSha=${{ github.sha }}
          --meta githubCommitOrg=${{ github.repository_owner }}
          --meta githubCommitRepo=${{ github.event.repository.name }}
          --meta githubDeployment=1)" >> "$GITHUB_OUTPUT"

      - name: Alias to Preview Domain
        run: vercel alias set ${{ steps.deploy.outputs.url }} api-preview.brewskibets.com --token=${{ secrets.VERCEL_TOKEN }} --scope=eagami
