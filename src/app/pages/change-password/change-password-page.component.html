<div class="auth-page">
  <div class="auth-container">
    <div class="branding">
      <img
        src="assets/bb.svg"
        alt="Brewski Bets"
        class="logo" />
      <span class="brand-name">brewski bets</span>
    </div>

    <ea-card
      variant="outlined"
      headerAlign="center">
      <h2 eaCardHeader>Change password</h2>

      <form
        class="auth-form"
        (ngSubmit)="onSubmit()">
        <ea-input
          label="Current Password"
          type="password"
          autocomplete="current-password"
          [autofocus]="true"
          [required]="true"
          [(value)]="currentPassword" />

        <ea-input
          label="New Password"
          type="password"
          autocomplete="new-password"
          hint="At least 8 characters"
          [required]="true"
          [(value)]="newPassword" />

        <ea-input
          label="Confirm New Password"
          type="password"
          autocomplete="new-password"
          [required]="true"
          [(value)]="confirmPassword" />

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <ea-button
          type="submit"
          variant="primary"
          [fullWidth]="true"
          [loading]="loading()">
          Change password
        </ea-button>
      </form>

      <p eaCardFooter class="auth-link">
        <a routerLink="/">Back to home</a>
      </p>
    </ea-card>
  </div>
</div>
