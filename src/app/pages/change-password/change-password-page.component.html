<div class="auth-page">
  <div class="auth-container">
    <div class="branding">
      <img
        src="assets/bb.svg"
        alt="Brewski Bets"
        class="logo" />
      <span class="brand-name">brewski bets</span>
    </div>

    <ea-card variant="outlined">
      <span slot="header">
        <h2>Change Password</h2>
      </span>

      <form
        class="auth-form"
        autocomplete="off"
        (ngSubmit)="onSubmit()">
        <ea-input
          label="Current Password"
          type="password"
          [required]="true"
          [(value)]="currentPassword" />

        <ea-input
          label="New Password"
          type="password"
          hint="At least 8 characters"
          [required]="true"
          [(value)]="newPassword" />

        <ea-input
          label="Confirm New Password"
          type="password"
          [required]="true"
          [(value)]="confirmPassword" />

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <ea-button
          type="submit"
          variant="primary"
          [fullWidth]="true"
          [loading]="loading()">
          Change Password
        </ea-button>
      </form>

      <span slot="footer">
        <p class="auth-link">
          <a routerLink="/">Back to home</a>
        </p>
      </span>
    </ea-card>
  </div>
</div>
