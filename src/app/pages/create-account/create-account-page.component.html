<div class="auth-page">
  <div class="auth-container">
    <div class="branding">
      <img
        src="assets/bb.svg"
        alt="Brewski Bets"
        class="logo" />
      <span class="brand-name">brewski bets</span>
    </div>

    @if (!pendingVerification()) {
      <ea-card
        variant="outlined"
        headerAlign="center">
        <h2 eaCardHeader>Create Account</h2>

        <form
          class="auth-form"
          (ngSubmit)="onSubmit()">
          <ea-input
            label="Email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            [autofocus]="true"
            [required]="true"
            [(value)]="email" />

          <ea-input
            label="Password"
            type="password"
            autocomplete="new-password"
            hint="At least 8 characters"
            [required]="true"
            [(value)]="password" />

          <ea-input
            label="Confirm Password"
            type="password"
            autocomplete="new-password"
            [required]="true"
            [(value)]="confirmPassword" />

          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <ea-button
            type="submit"
            variant="primary"
            [fullWidth]="true"
            [loading]="loading()">
            Create Account
          </ea-button>
        </form>

        <p eaCardFooter class="auth-link">
          Already have an account?
          <a routerLink="/login">Log in</a>
        </p>
      </ea-card>
    } @else {
      <ea-card
        variant="outlined"
        headerAlign="center">
        <h2 eaCardHeader>Verify Email</h2>

        <form
          class="auth-form"
          (ngSubmit)="onVerify()">
          <p class="hint">We sent a verification code to {{ email() }}.</p>

          <ea-input
            label="Verification Code"
            autocomplete="one-time-code"
            placeholder="Enter code"
            [autofocus]="true"
            [required]="true"
            [(value)]="verificationCode" />

          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <ea-button
            type="submit"
            variant="primary"
            [fullWidth]="true"
            [loading]="loading()">
            Verify
          </ea-button>
        </form>
      </ea-card>
    }
  </div>
</div>
