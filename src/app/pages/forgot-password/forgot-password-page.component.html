<div class="auth-page">
  <div class="auth-container">
    <div class="branding">
      <img
        src="assets/bb.svg"
        alt="Brewski Bets"
        class="logo" />
      <span class="brand-name">brewski bets</span>
    </div>

    @if (!codeSent()) {
      <ea-card
        variant="outlined"
        headerAlign="center">
        <h2 eaCardHeader>Forgot password</h2>

        <form
          class="auth-form"
          (ngSubmit)="onSendCode()">
          <ea-input
            label="Email"
            type="email"
            autocomplete="email"
            placeholder="you@example.com"
            [autofocus]="true"
            [required]="true"
            [(value)]="email" />

          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <ea-button
            type="submit"
            variant="primary"
            [fullWidth]="true"
            [loading]="loading()">
            Send reset code
          </ea-button>
        </form>

        <p eaCardFooter class="auth-link">
          <a routerLink="/login">Back to log in</a>
        </p>
      </ea-card>
    } @else {
      <ea-card
        variant="outlined"
        headerAlign="center">
        <h2 eaCardHeader>Reset password</h2>

        <form
          class="auth-form"
          (ngSubmit)="onResetPassword()">
          <p class="hint">
            Enter the code sent to {{ email() }} and your new password.
          </p>

          <ea-input
            label="Reset Code"
            autocomplete="one-time-code"
            placeholder="Enter code"
            [autofocus]="true"
            [required]="true"
            [(value)]="code" />

          <ea-input
            label="New Password"
            type="password"
            autocomplete="new-password"
            hint="At least 8 characters"
            [required]="true"
            [(value)]="newPassword" />

          <ea-input
            label="Confirm Password"
            type="password"
            autocomplete="new-password"
            [required]="true"
            [(value)]="confirmPassword" />

          @if (error()) {
            <p class="error">{{ error() }}</p>
          }

          <ea-button
            type="submit"
            variant="primary"
            [fullWidth]="true"
            [loading]="loading()">
            Reset password
          </ea-button>
        </form>

        <p eaCardFooter class="auth-link">
          <a routerLink="/login">Back to log in</a>
        </p>
      </ea-card>
    }
  </div>
</div>
