<header class="header">
  <a routerLink="/" class="branding">
    <img
      src="assets/bb.svg"
      alt="Brewski Bets"
      class="logo" />
    <h1 class="brand-name">brewski bets</h1>
  </a>

  <div class="user-menu">
    <button
      class="avatar-button"
      (click)="toggleMenu()"
      aria-label="Account menu">
      <ea-avatar
        [src]="avatarSrc()"
        [initials]="initials()"
        alt="Your avatar"
        size="sm" />
    </button>

    @if (menuOpen()) {
      <div class="menu-backdrop" (click)="closeMenu()"></div>
      <div class="menu-popover">
        <button class="menu-item" (click)="onAccount()">Account</button>
        <button class="menu-item menu-item--danger" (click)="onLogOut()">Log out</button>
      </div>
    }
  </div>
</header>
