<header class="header">
  <a
    routerLink="/"
    class="branding">
    <img
      src="assets/bb.svg"
      alt="Brewski Bets"
      class="logo" />
    <h1 class="brand-name">brewski bets</h1>
    @if (previewInfo) {
      <a
        class="preview-badge"
        [href]="previewInfo.prUrl"
        target="_blank"
        rel="noopener noreferrer"
        (click)="$event.stopPropagation()">
        preview
        <div class="preview-tooltip">
          <span><span class="preview-label">Branch:</span> {{ previewInfo.branch }}</span>
          <span><span class="preview-label">Commit:</span> {{ previewInfo.commit }}</span>
          <span><span class="preview-label">Date:</span> {{ previewInfo.date }}</span>
        </div>
      </a>
    }
  </a>

  @if (isLoggedIn()) {
    <div class="user-menu">
      <button
        class="avatar-button"
        (click)="toggleMenu()"
        aria-label="Account menu">
        <ea-avatar
          [src]="avatarSrc()"
          [initials]="initials()"
          alt="Your avatar"
          size="sm" />
      </button>

      @if (menuOpen()) {
        <div
          class="menu-backdrop"
          (click)="closeMenu()"></div>
        <div class="menu-popover">
          <a
            class="menu-item"
            routerLink="/account"
            (click)="closeMenu()">
            Account
          </a>
          <a
            class="menu-item menu-item--danger"
            routerLink="/login"
            (click)="onLogOut()">
            Log out
          </a>
        </div>
      }
    </div>
  } @else if (showLoginButton()) {
    <ea-button
      variant="ghost"
      size="sm"
      routerLink="/login">
      Log in
    </ea-button>
  }
</header>
