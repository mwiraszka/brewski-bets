<header class="header">
  <a
    routerLink="/"
    class="branding"
    [eaTooltip]="previewTooltip ?? ''">
    <img
      src="assets/bb.svg"
      alt="Brewski Bets"
      class="logo" />
    <h1 class="brand-name">brewski bets</h1>
  </a>

  @if (isLoggedIn()) {
    <div class="user-menu">
      <button
        class="avatar-button"
        (click)="toggleMenu()"
        aria-label="Account menu">
        <ea-avatar
          [src]="avatarSrc()"
          [initials]="initials()"
          alt="Your avatar"
          size="sm" />
      </button>

      @if (menuOpen()) {
        <div
          class="menu-backdrop"
          (click)="closeMenu()"></div>
        <div class="menu-popover">
          <a
            class="menu-item"
            routerLink="/account"
            (click)="closeMenu()">
            Account
          </a>
          <a
            class="menu-item menu-item--danger"
            routerLink="/login"
            (click)="onLogOut()">
            Log out
          </a>
        </div>
      }
    </div>
  } @else if (showLoginButton()) {
    <ea-button
      variant="ghost"
      size="sm"
      routerLink="/login">
      Log in
    </ea-button>
  }
</header>
