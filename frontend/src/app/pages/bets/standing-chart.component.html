<div class="chart-shell">
  <div
    class="chart-scroll"
    #scroller
    (scroll)="hideTip()">
    <div
      class="chart-box"
      [style.min-width.px]="minWidth()">
      <canvas
        #canvas
        role="img"
        [attr.aria-label]="ariaLabel()">
      </canvas>
    </div>
  </div>

  @if (tip(); as tip) {
    <div
      class="chart-tip"
      [style.left.px]="tip.x"
      [style.top.px]="tip.y">
      <span class="chart-tip__title">{{ tip.title }}</span>
      @if (tip.delta !== null) {
        <span
          class="chart-tip__value"
          [class.chart-tip__value--positive]="tip.delta > 0"
          [class.chart-tip__value--negative]="tip.delta < 0">
          Result: {{ signed(tip.delta) }}
          <ea-icon-bottle class="chart-tip__icon" />
        </span>
      }
      <span
        class="chart-tip__value"
        [class.chart-tip__value--positive]="tip.balance > 0"
        [class.chart-tip__value--negative]="tip.balance < 0">
        Balance: {{ signed(tip.balance) }}
        <ea-icon-bottle class="chart-tip__icon" />
      </span>
      @if (tip.settledDate; as settledDate) {
        <span class="chart-tip__date">{{ settledDate }}</span>
      }
    </div>
  }
</div>
