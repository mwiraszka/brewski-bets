<ea-card
  variant="outlined"
  headerAlign="center">
  <h2 slot="header">Change password</h2>

  <form
    class="auth-form"
    (ngSubmit)="onSubmit()">
    <ea-input
      label="Current Password"
      type="password"
      autocomplete="current-password"
      [autofocus]="true"
      [required]="true"
      [errorMsg]="currentPasswordError()"
      (blurred)="onCurrentPasswordBlur()"
      [(value)]="currentPassword" />

    <ea-input
      label="New Password"
      type="password"
      autocomplete="new-password"
      [required]="true"
      [errorMsg]="newPasswordError()"
      (blurred)="onNewPasswordBlur()"
      [(value)]="newPassword" />

    <ea-input
      label="Confirm New Password"
      type="password"
      autocomplete="new-password"
      [required]="true"
      [errorMsg]="confirmPasswordError()"
      (blurred)="onConfirmPasswordBlur()"
      [(value)]="confirmPassword" />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <ea-button
      type="submit"
      variant="primary"
      [fullWidth]="true"
      [loading]="loading()">
      Change password
    </ea-button>
  </form>

  <p
    slot="footer"
    class="auth-link">
    <a routerLink="/">Back to home</a>
  </p>
</ea-card>
