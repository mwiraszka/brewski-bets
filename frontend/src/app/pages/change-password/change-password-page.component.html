<ea-card
  variant="outlined"
  headerAlign="center">
  <h2 eaCardHeader>Change password</h2>

  <form
    class="auth-form"
    (ngSubmit)="onSubmit()">
    <ea-input
      label="Current Password"
      type="password"
      autocomplete="current-password"
      [autofocus]="true"
      [required]="true"
      [error]="currentPasswordError()"
      (inputBlurred)="onCurrentPasswordBlur()"
      [(value)]="currentPassword" />

    <ea-input
      label="New Password"
      type="password"
      autocomplete="new-password"
      [required]="true"
      [error]="newPasswordError()"
      (inputBlurred)="onNewPasswordBlur()"
      [(value)]="newPassword" />

    <ea-input
      label="Confirm New Password"
      type="password"
      autocomplete="new-password"
      [required]="true"
      [error]="confirmPasswordError()"
      (inputBlurred)="onConfirmPasswordBlur()"
      [(value)]="confirmPassword" />

    @if (error()) {
      <p class="error">{{ error() }}</p>
    }

    <ea-button
      type="submit"
      variant="primary"
      [fullWidth]="true"
      [loading]="loading()">
      Change password
    </ea-button>
  </form>

  <p eaCardFooter class="auth-link">
    <a routerLink="/">Back to home</a>
  </p>
</ea-card>
