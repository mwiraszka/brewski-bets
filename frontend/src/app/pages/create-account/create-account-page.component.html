@if (!pendingVerification()) {
  <ea-card
    variant="outlined"
    headerAlign="center">
    <h2 slot="header">Create account</h2>

    <div class="auth-form">
      <ea-button
        variant="secondary"
        [fullWidth]="true"
        [loading]="googleLoading()"
        (clicked)="onContinueWithGoogle()">
        <bb-google-icon slot="prefix" />
        Continue with Google
      </ea-button>

      <ea-divider label="or" />

      <form
        class="auth-form"
        (ngSubmit)="onSubmit()">
        <div class="name-row">
          <ea-input
            label="First name"
            autocomplete="given-name"
            [autofocus]="true"
            [required]="true"
            [errorMsg]="firstNameError()"
            [(value)]="firstName" />

          <ea-input
            label="Last name"
            autocomplete="family-name"
            [required]="true"
            [errorMsg]="lastNameError()"
            [(value)]="lastName" />
        </div>

        <ea-input
          label="Email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          [required]="true"
          [errorMsg]="emailError()"
          (blurred)="onEmailBlur()"
          [(value)]="email" />

        <ea-input
          label="Password"
          type="password"
          autocomplete="new-password"
          [required]="true"
          [errorMsg]="passwordError()"
          (blurred)="onPasswordBlur()"
          [(value)]="password" />

        <ea-input
          label="Confirm Password"
          type="password"
          autocomplete="new-password"
          [required]="true"
          [errorMsg]="confirmPasswordError()"
          (blurred)="onConfirmPasswordBlur()"
          [(value)]="confirmPassword" />

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <div id="clerk-captcha"></div>

        <ea-button
          type="submit"
          variant="primary"
          [fullWidth]="true"
          [loading]="loading()">
          Create account
        </ea-button>
      </form>
    </div>

    <div
      slot="footer"
      class="auth-footer">
      <p class="auth-link">
        Already have an account?
        <a routerLink="/login">Log in</a>
      </p>
    </div>
  </ea-card>
} @else {
  <ea-card
    variant="outlined"
    headerAlign="center">
    <h2 slot="header">Verify email</h2>

    <div class="auth-form">
      <p class="hint">We sent a verification code to {{ email() }}.</p>

      <div
        class="code-input"
        #codeInput>
        <ea-code-input
          label="Verification code"
          [errorMsg]="verificationCodeError()"
          (completed)="onVerify()"
          [(value)]="verificationCode" />
      </div>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
    </div>
  </ea-card>
}
