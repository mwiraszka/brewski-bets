@if (!pendingSecondFactor()) {
  <ea-card
    variant="outlined"
    headerAlign="center">
    <h2 slot="header">Log in</h2>

    <div class="auth-form">
      <ea-button
        variant="secondary"
        [fullWidth]="true"
        [loading]="googleLoading()"
        (clicked)="onContinueWithGoogle()">
        <bb-google-icon slot="prefix" />
        Continue with Google
      </ea-button>

      <ea-divider label="or" />

      <form
        class="auth-form"
        (ngSubmit)="onSubmit()">
        <ea-input
          label="Email"
          type="email"
          autocomplete="email"
          placeholder="you@example.com"
          [autofocus]="true"
          [required]="true"
          [errorMsg]="emailError()"
          (blurred)="onEmailBlur()"
          [(value)]="email" />

        <ea-input
          label="Password"
          type="password"
          autocomplete="current-password"
          [required]="true"
          [errorMsg]="passwordError()"
          (blurred)="onPasswordBlur()"
          [(value)]="password" />

        @if (error()) {
          <p class="error">{{ error() }}</p>
        }

        <ea-button
          type="submit"
          variant="primary"
          [fullWidth]="true"
          [loading]="loading()">
          Log in
        </ea-button>
      </form>
    </div>

    <div
      slot="footer"
      class="auth-footer">
      <p class="auth-link">
        <a routerLink="/forgot-password">Forgot password?</a>
      </p>
      <p class="auth-link">
        Don't have an account?
        <a routerLink="/create-account">Create account</a>
      </p>
    </div>
  </ea-card>
} @else {
  <ea-card
    variant="outlined"
    headerAlign="center">
    <h2 slot="header">Verify your identity</h2>

    <div class="auth-form">
      <p class="hint">We sent a verification code to {{ email() }}.</p>

      <div
        class="code-input"
        #codeInput>
        <ea-code-input
          label="Verification code"
          [errorMsg]="verificationCodeError()"
          (completed)="onVerify()"
          [(value)]="verificationCode" />
      </div>

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }
    </div>
  </ea-card>
}
