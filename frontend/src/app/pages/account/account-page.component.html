<div class="account-page">
  <ea-card variant="outlined">
    <h2 slot="header">Account</h2>

    @if (loading()) {
      <bb-loading label="Loading your account" />
    } @else {
      <div class="avatar-section">
        <ea-avatar-editor
          shape="circle"
          [canvasSize]="200"
          [loading]="avatarLoading()"
          [currentSrc]="editorSrc()"
          [cropState]="savedCropState()"
          (fileSelected)="onFileSelected($event)"
          (cropStateChanged)="onCropStateChange($event)"
          (removed)="onRemoveAvatar()" />
      </div>

      <p class="email">{{ email() }}</p>

      <div class="fields">
        <ea-input
          label="First name"
          [required]="true"
          [errorMsg]="firstNameError()"
          [(value)]="firstName" />
        <ea-input
          label="Last name"
          [required]="true"
          [errorMsg]="lastNameError()"
          [(value)]="lastName" />
      </div>

      <div class="actions">
        <ea-button
          [fullWidth]="true"
          [disabled]="!hasChanges()"
          [loading]="saving()"
          (clicked)="onSave()">
          Save
        </ea-button>
      </div>

      <div class="delete-section">
        <ea-divider />
        <ea-button
          variant="danger"
          [fullWidth]="true"
          [loading]="deleting()"
          (clicked)="deleteDialogOpen.set(true)">
          Delete account
        </ea-button>
      </div>
    }
  </ea-card>
</div>

<ea-dialog
  [(open)]="deleteDialogOpen"
  size="sm">
  <span slot="header">Delete account</span>
  <p>Are you sure you want to delete your account? This action cannot be undone.</p>
  <div slot="footer">
    <ea-button
      variant="secondary"
      (clicked)="deleteDialogOpen.set(false)">
      Cancel
    </ea-button>
    <ea-button
      variant="danger"
      [loading]="deleting()"
      (clicked)="onConfirmDelete()">
      Confirm
    </ea-button>
  </div>
</ea-dialog>
