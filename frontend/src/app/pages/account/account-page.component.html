<div class="account-page">
  <ea-card variant="outlined">
    <h2 eaCardHeader>Account</h2>

    <div class="avatar-section">
      <ea-avatar-editor
        shape="circle"
        [canvasSize]="200"
        [currentSrc]="avatarSrc()"
        (cropped)="onCropped($event)"
        (removed)="onRemoveAvatar()" />
    </div>

    <div class="name-fields">
      <ea-input
        label="First name"
        [required]="true"
        [error]="firstNameError()"
        [(value)]="firstName" />
      <ea-input
        label="Last name"
        [required]="true"
        [error]="lastNameError()"
        [(value)]="lastName" />
    </div>

    <div class="actions">
      <ea-button
        [fullWidth]="true"
        [disabled]="!hasChanges()"
        [loading]="saving()"
        (clicked)="onSave()">
        Save
      </ea-button>
    </div>
  </ea-card>
</div>
