<div class="account-page">
  <ea-card variant="outlined">
    <h2 eaCardHeader>Account</h2>

    <div class="avatar-section">
      <div class="avatar-editor-wrapper">
        @if (showSkeleton()) {
          <ea-skeleton
            class="avatar-skeleton"
            variant="circle"
            width="200px"
            height="200px" />
        }
        <ea-avatar-editor
          [class.avatar-editor--loading]="showSkeleton()"
          shape="circle"
          [canvasSize]="200"
          [currentSrc]="editorSrc()"
          [cropState]="savedCropState()"
          (fileSelected)="onFileSelected($event)"
          (cropStateChange)="onCropStateChange($event)"
          (removed)="onRemoveAvatar()" />
      </div>
    </div>

    <div class="name-fields">
      <ea-input
        label="First name"
        [required]="true"
        [error]="firstNameError()"
        [(value)]="firstName" />
      <ea-input
        label="Last name"
        [required]="true"
        [error]="lastNameError()"
        [(value)]="lastName" />
    </div>

    <div class="actions">
      <ea-button
        [fullWidth]="true"
        [disabled]="!hasChanges()"
        [loading]="saving()"
        (clicked)="onSave()">
        Save
      </ea-button>
    </div>
  </ea-card>
</div>
