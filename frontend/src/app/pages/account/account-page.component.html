<div class="account-page">
  <ea-card variant="outlined">
    <h2 eaCardHeader>Account</h2>

    <div class="avatar-section">
      <ea-avatar-editor
        shape="circle"
        [canvasSize]="200"
        [currentSrc]="editorSrc()"
        [cropState]="savedCropState()"
        (fileSelected)="onFileSelected($event)"
        (cropStateChange)="onCropStateChange($event)"
        (removed)="onRemoveAvatar()" />
    </div>

    <div class="name-fields">
      <ea-input
        label="First name"
        [required]="true"
        [error]="firstNameError()"
        [(value)]="firstName" />
      <ea-input
        label="Last name"
        [required]="true"
        [error]="lastNameError()"
        [(value)]="lastName" />
    </div>

    <div class="actions">
      <ea-button
        [fullWidth]="true"
        [disabled]="!hasChanges()"
        [loading]="saving()"
        (clicked)="onSave()">
        Save
      </ea-button>
    </div>

    <div class="delete-section">
      <ea-divider />
      <ea-button
        variant="danger"
        [fullWidth]="true"
        [loading]="deleting()"
        (clicked)="deleteDialogOpen.set(true)">
        Delete account
      </ea-button>
    </div>
  </ea-card>
</div>

<ea-dialog
  [(open)]="deleteDialogOpen"
  size="sm">
  <span slot="header">Delete account</span>
  <p>Are you sure you want to delete your account? This action cannot be undone.</p>
  <div slot="footer">
    <ea-button
      variant="secondary"
      (clicked)="deleteDialogOpen.set(false)">
      Cancel
    </ea-button>
    <ea-button
      variant="danger"
      [loading]="deleting()"
      (clicked)="onConfirmDelete()">
      Confirm
    </ea-button>
  </div>
</ea-dialog>
