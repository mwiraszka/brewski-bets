@if (!codeSent()) {
  <ea-card
    variant="outlined"
    headerAlign="center">
    <h2 slot="header">Forgot password</h2>

    <form
      class="auth-form"
      (ngSubmit)="onSendCode()">
      <ea-input
        label="Email"
        type="email"
        autocomplete="email"
        placeholder="you@example.com"
        [autofocus]="true"
        [required]="true"
        [errorMsg]="emailError()"
        (blurred)="onEmailBlur()"
        [(value)]="email" />

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <ea-button
        type="submit"
        variant="primary"
        [fullWidth]="true"
        [loading]="loading()">
        Send reset code
      </ea-button>
    </form>

    <p
      slot="footer"
      class="auth-link">
      <a routerLink="/login">Back to log in</a>
    </p>
  </ea-card>
} @else {
  <ea-card
    variant="outlined"
    headerAlign="center">
    <h2 slot="header">Reset password</h2>

    <form
      class="auth-form"
      (ngSubmit)="onResetPassword()">
      <p class="hint"> Enter the code sent to {{ email() }} and your new password. </p>

      <ea-input
        label="Reset Code"
        autocomplete="one-time-code"
        placeholder="Enter code"
        [autofocus]="true"
        [required]="true"
        [errorMsg]="codeError()"
        (blurred)="onCodeBlur()"
        [(value)]="code" />

      <ea-input
        label="New Password"
        type="password"
        autocomplete="new-password"
        [required]="true"
        [errorMsg]="newPasswordError()"
        (blurred)="onNewPasswordBlur()"
        [(value)]="newPassword" />

      <ea-input
        label="Confirm Password"
        type="password"
        autocomplete="new-password"
        [required]="true"
        [errorMsg]="confirmPasswordError()"
        (blurred)="onConfirmPasswordBlur()"
        [(value)]="confirmPassword" />

      @if (error()) {
        <p class="error">{{ error() }}</p>
      }

      <ea-button
        type="submit"
        variant="primary"
        [fullWidth]="true"
        [loading]="loading()">
        Reset password
      </ea-button>
    </form>

    <p
      slot="footer"
      class="auth-link">
      <a routerLink="/login">Back to log in</a>
    </p>
  </ea-card>
}
