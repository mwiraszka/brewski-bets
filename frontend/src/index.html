      color="#cba855" />

      rel="preload"
      as="font"
      type="font/woff2"
      href="assets/fonts/righteous-v18-latin.woff2"
      crossorigin />
    <!-- Pre-paint theme resolution; must stay in sync with ThemeService. -->
    <script>
      (function () {
        function resolveTheme() {
          try {
            var stored = localStorage.getItem('bb-theme');
            if (stored === 'dark' || stored === 'light') return stored;
          } catch (e) {}
          try {
            if (
              window.matchMedia &&
              window.matchMedia('(prefers-color-scheme: dark)').matches
            ) {
              return 'dark';
            }
          } catch (e) {}
          return 'light';
        }
        document.documentElement.setAttribute('data-theme', resolveTheme());
      })();
    </script>
    <!-- Critical CSS -->
    <style>
      @font-face {
        font-family: 'Righteous';
        font-style: normal;
        font-weight: 400;
        font-display: swap;
        src: url('assets/fonts/righteous-v18-latin.woff2') format('woff2');
      }

      :root {
        --bb-boot-bg: #f3f7fa;
        --bb-boot-track: rgba(0, 0, 0, 0.08);
        --bb-boot-text: rgba(0, 0, 0, 0.55);
      }
      :root[data-theme='dark'] {
        --bb-boot-bg: #121516;
        --bb-boot-track: rgba(255, 255, 255, 0.1);
        --bb-boot-text: rgba(255, 255, 255, 0.6);
      }
      @media (prefers-color-scheme: dark) {
        :root:not([data-theme='light']) {
          --bb-boot-bg: #121516;
          --bb-boot-track: rgba(255, 255, 255, 0.1);
          --bb-boot-text: rgba(255, 255, 255, 0.6);
        }
      }

      body {
        margin: 0;
        overflow: hidden;
        height: 100vh;
        background-color: var(--bb-boot-bg);
      }

      img {
        display: block;
        max-width: 100%;
        height: auto;
      }

      h1 {
        font-family: 'Righteous', sans-serif;
        font-weight: 400;
      }

      h2,
      h3,
      h4 {
        font-family: arial, sans-serif;
        font-weight: 100;
      }

      .app-boot {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 16px;
        height: 100vh;
        background-color: var(--bb-boot-bg);
      }

      .app-boot__label {
        font-size: 16px;
        font-weight: 500;
        font-family: arial, sans-serif;
        color: var(--bb-boot-text);
      }

      .app-boot__spinner {
        width: 48px;
        height: 48px;
        border: 4px solid var(--bb-boot-track);
        border-top-color: #cba855;
        border-radius: 50%;
        animation: app-boot-spin 0.8s linear infinite;
      }

      @keyframes app-boot-spin {
        to {
          transform: rotate(360deg);
        }
      }
    </style>
    <!-- Privacy-friendly analytics by Plausible -->
    <script
      async
      src="https://plausible.io/js/pa-IAPZe-jyGdT7DLxjBitCI.js"></script>
    <script>
      ((window.plausible =
        window.plausible ||
        function () {
          (plausible.q = plausible.q || []).push(arguments);
        }),
        (plausible.init =
          plausible.init ||
          function (i) {
            plausible.o = i || {};
          }));
      plausible.init();
    </script>
  </head>
  <body>
    <bb-root>
      <div class="app-boot">
        <span class="app-boot__label">Loading...</span>
        <div
          class="app-boot__spinner"
          role="status"
          aria-label="Loading">
        </div>
      </div>
    </bb-root>
  </body>
